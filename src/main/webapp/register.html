<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="logo-wrap">
        <div class="logo-circle" aria-hidden="true">
          <img src="image/white_lock.png" alt="" />
        </div>
      </div>

      <div class="welcome">
        <h1>Welcome</h1>
        <p>Login to your account or create a new one</p>
      </div>

      <nav class="switcher" aria-label="Authentication pages">
        <a class="switch-link" href="login.html">Login</a>
        <a class="switch-link active" href="register.html">Register</a>
      </nav>

      <form id="register-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="register-name">Full Name</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <img class="icon-img" src="image/user.png" alt="" />
            </span>
            <input id="register-name" type="text" placeholder="John Doe" />
          </div>
        </div>

        <div class="form-group">
          <label for="register-email">Email</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <img class="icon-img" src="image/email.png" alt="" />
            </span>
            <input id="register-email" type="email" placeholder="name@example.com" />
          </div>
        </div>

        <div class="form-group">
          <label for="register-password">Password</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <img class="icon-img" src="image/lock.png" alt="" />
            </span>
            <input id="register-password" type="password" placeholder="At least 8 characters" />
            <button class="password-toggle" type="button" data-target="register-password" aria-label="Show password">
              <img src="image/visible.png" alt="" />
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="register-confirm-password">Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <img class="icon-img" src="image/lock.png" alt="" />
            </span>
            <input id="register-confirm-password" type="password" placeholder="Re-enter your password" />
            <button class="password-toggle" type="button" data-target="register-confirm-password" aria-label="Show password">
              <img src="image/visible.png" alt="" />
            </button>
          </div>
        </div>

        <div id="register-error" class="error-box" aria-live="polite"></div>

        <button class="submit-btn" type="submit">Create Account</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
