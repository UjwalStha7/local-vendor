<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop</title>
  <link rel="stylesheet" href="shop.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-title">Produce Shop</span>
      </div>

      <nav class="nav">
        <a class="nav-link" href="cart.html" aria-label="Open cart">
          <img src="image/cart.png" alt="" aria-hidden="true" />
          Cart
        </a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero" aria-label="Shop hero">
      <div class="hero-inner">
        <h1>Fresh &amp; Organic</h1>
        <p>Click any product to see details.</p>
      </div>
    </section>

    <section class="wrap" aria-label="Product list">
      <div id="grid" class="grid"></div>
    </section>
  </main>

  <script src="shop.js"></script>
</body>
</html>
